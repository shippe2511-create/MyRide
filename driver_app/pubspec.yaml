name: driver_app
description: "MyRide Driver - Staff Transport Driver App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  supabase_flutter: ^2.8.4
  flutter_tts: ^4.2.0
  # Firebase disabled - requires paid Apple Developer Program
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_ios.png"
  ios_content_mode: scaleAspectFill
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
