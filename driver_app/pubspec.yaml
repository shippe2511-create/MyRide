name: driver_app
description: "MyRide Driver - Staff Transport Driver App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  image_picker: ^1.2.3
  path_provider: ^2.1.5
  supabase_flutter: ^2.16.0
  flutter_tts: ^4.2.0
  connectivity_plus: ^6.1.3
  lottie: ^3.5.1
  share_plus: ^13.2.0
  uuid: ^4.5.1
  just_audio: ^0.9.40
  audio_waveforms: ^1.2.0
  audioplayers: ^6.1.0
  local_auth: ^2.3.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  geocoding: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_ios.png"
  ios_content_mode: scaleAspectFill
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/animations/
    - assets/sounds/
